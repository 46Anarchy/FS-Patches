buildscript {
    repositories {
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://jitpack.io"
        }
    }
    dependencies {
        classpath('com.github.GTNewHorizons:ForgeGradle:1.2.11') {
            exclude group: "org.eclipse.equinox"
        }
    }
}

plugins {
    id 'java-library'
    id 'maven-publish'
}

repositories {
    mavenCentral()
    maven {
        name = "spigot"
        url = "https://hub.spigotmc.org/nexus/content/repositories/snapshots/"
    }
}

configurations {
    shade
}

dependencies {
    shade 'org.reflections:reflections:0.10.2'
    compileOnly 'org.spigotmc:spigot-api:1.8-R0.1-SNAPSHOT'
}

jar {
    archiveName = "fs-patches.jar"
}

if(project.enable_lombok.toBoolean()) {
    dependencies {
        compileOnly 'org.projectlombok:lombok:1.18.4'
    }
}

apply from: "buildscript/forge-1.7.gradle"